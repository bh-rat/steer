name: Release

# Tag a version (git tag v0.3.0 && git push --tags) to build the sdist +
# wheel and attach them to a GitHub Release. PyPI publishing is deliberately
# not wired up yet (roadmap).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build
      - name: Sanity-check the wheel
        run: |
          python -m pip install dist/*.whl
          steer --version
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
